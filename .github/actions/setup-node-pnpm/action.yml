name: Setup Node & pnpm
description: Install the Node version from package.json devEngines.runtime, then activate pnpm from packageManager
runs:
  using: composite
  steps:
    - name: Determine Node version
      id: node-version
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"

        # Read the desired Node version from devEngines.runtime so it stays in sync with package.json.
        NODE_VERSION="$(node -p "const v = require('./package.json').devEngines?.runtime?.version; if (!v) throw new Error('Expected devEngines.runtime.version in package.json'); v")"
        echo "version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.node-version.outputs.version }}

    - name: Install pnpm
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"

        # Install pnpm using the root packageManager field.
        corepack enable
        PNPM_VERSION="$(node -p "const packageManager = require('./package.json').packageManager; if (!packageManager || !packageManager.startsWith('pnpm@')) throw new Error('Expected packageManager to start with pnpm@'); packageManager.slice('pnpm@'.length)")"
        corepack prepare "pnpm@$PNPM_VERSION" --activate

        echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
        echo "Host Node version: $(node -v)"
        echo "pnpm version: $(pnpm -v)"

    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: ${{ env.PNPM_STORE_PATH }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-
