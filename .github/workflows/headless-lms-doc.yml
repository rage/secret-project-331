name: headless-lms docs

permissions: read-all

on:
  push:
    branches: [master]
    paths:
      - ".github/actions/setup-node-pnpm/**"
      - ".github/workflows/headless-lms-doc.yml"
      - "bin/.common"
      - "bin/generate-doc-files"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "rust-toolchain.toml"
      - "services/headless-lms/**"
  pull_request:
    branches: [master]
    paths:
      - ".github/actions/setup-node-pnpm/**"
      - ".github/workflows/headless-lms-doc.yml"
      - "bin/.common"
      - "bin/generate-doc-files"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "rust-toolchain.toml"
      - "services/headless-lms/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Cargo dependencies and docs build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/headless-lms/target/
          key: ${{ runner.os }}-headless-lms-docs-cargo-${{ hashFiles('services/headless-lms/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-headless-lms-docs-cargo-

      - uses: ./.github/actions/setup-node-pnpm
      - name: Run pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate doc files
        run: bin/generate-doc-files

      - name: Generate documentation
        run: cargo doc --workspace --no-deps --document-private-items
        working-directory: services/headless-lms

      - name: Check out docs repo
        uses: actions/checkout@v5
        with:
          repository: rage/secret-project-331-headless-lms-docs
          path: headless-lms-docs
          fetch-depth: 0
          ssh-key: ${{ secrets.HEADLESS_LMS_DOCS_DEPLOY_KEY }}
        if: ${{ github.ref == 'refs/heads/master' }}

      - name: Copy generated documentation
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ../services/headless-lms/target/doc/. .
          touch .nojekyll
        working-directory: ./headless-lms-docs
        if: ${{ github.ref == 'refs/heads/master' }}

      - name: Commit docs
        run: |
          git config --local user.email "bot@example.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Update: $GITHUB_SHA" --allow-empty
        working-directory: ./headless-lms-docs
        if: ${{ github.ref == 'refs/heads/master' }}

      - name: Push docs
        run: git push
        working-directory: ./headless-lms-docs
        if: ${{ github.ref == 'refs/heads/master' }}
