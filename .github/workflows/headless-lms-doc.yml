name: headless-lms docs

permissions: read-all

on:
  push:
    branches: [master]
    paths:
      - ".github/actions/setup-node-pnpm/**"
      - ".github/workflows/headless-lms-doc.yml"
      - "bin/.common"
      - "bin/generate-doc-files"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "rust-toolchain.toml"
      - "services/headless-lms/**"
  pull_request:
    branches: [master]
    paths:
      - ".github/actions/setup-node-pnpm/**"
      - ".github/workflows/headless-lms-doc.yml"
      - "bin/.common"
      - "bin/generate-doc-files"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "rust-toolchain.toml"
      - "services/headless-lms/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Cargo dependencies and docs build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/headless-lms/target/
          key: ${{ runner.os }}-headless-lms-docs-cargo-${{ hashFiles('services/headless-lms/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-headless-lms-docs-cargo-

      - uses: ./.github/actions/setup-node-pnpm
      - name: Run pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate doc files
        run: bin/generate-doc-files

      - name: Generate documentation
        run: cargo doc --workspace --no-deps --document-private-items
        working-directory: services/headless-lms

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: services/headless-lms/target/doc
        if: ${{ github.ref == 'refs/heads/master' }}
