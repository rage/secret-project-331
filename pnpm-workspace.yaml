engineStrict: true

linkWorkspacePackages: true

managePackageManagerVersions: true

minimumReleaseAgeExclude:
  - next
  - react
  - react-dom
  - '@next/*'

nodeVersion: 24.14.0

onlyBuiltDependencies:
  - esbuild unrs-resolver

overrides:
  brace-expansion@<1.1.13: '>=1.1.13 <2'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3 <3'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  minimatch@<3.1.3: '>=3.1.4 <4'
  minimatch@<3.1.4: '>=3.1.4 <4'
  minimatch@>=9.0.0 <9.0.6: '>=9.0.7 <10'
  minimatch@>=9.0.0 <9.0.7: '>=9.0.7 <10'
  picomatch@<2.3.2: '>=2.3.2'

packageManagerStrictVersion: true

preferFrozenLockfile: true

preferWorkspacePackages: true

registrySupportsTimeField: false

resolutionMode: time-based

saveWorkspaceProtocol: rolling

sharedWorkspaceLockfile: false

strictDepBuilds: true

updateNotifier: false

useNodeVersion: 24.14.0

verifyDepsBeforeRun: install
